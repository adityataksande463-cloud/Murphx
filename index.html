  <style>
    /* ---------- CSS RESET & GLOBAL VARIABLES ---------- */
    :root {
      /* Primary Color System - HSL based */
      --primary-h: 250;
      --primary-s: 85%;
      --primary-l: 65%;
      --primary: hsl(var(--primary-h), var(--primary-s), var(--primary-l));
      --primary-dark: hsl(var(--primary-h), var(--primary-s), 55%);
      --primary-light: hsl(var(--primary-h), var(--primary-s), 75%);
      
      /* Secondary - Pink/Red tones for accent */
      --secondary-h: 340;
      --secondary-s: 82%;
      --secondary-l: 65%;
      --secondary: hsl(var(--secondary-h), var(--secondary-s), var(--secondary-l));
      
      /* Success/Emerald */
      --success: hsl(160, 84%, 39%);
      --warning: hsl(35, 95%, 55%);
      --danger: hsl(0, 84%, 60%);
      
      /* Neutrals */
      --gray-50: #fafaf9;
      --gray-100: #f5f5f4;
      --gray-200: #e7e5e4;
      --gray-300: #d6d3d1;
      --gray-400: #a8a29e;
      --gray-500: #78716c;
      --gray-600: #57534e;
      --gray-700: #44403c;
      --gray-800: #292524;
      --gray-900: #1c1917;
      
      /* Gradients */
      --gradient-primary: linear-gradient(135deg, hsl(250, 85%, 65%), hsl(280, 85%, 65%));
      --gradient-secondary: linear-gradient(135deg, hsl(340, 82%, 65%), hsl(360, 82%, 65%));
      --gradient-mesh: radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.08), transparent 50%);
      
      /* Shadows */
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
      --shadow-2xl: 0 25px 50px -12px rgb(0 0 0 / 0.25);
      
      /* Spacing - 8px base */
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --space-16: 4rem;
      --space-20: 5rem;
      
      /* Border Radius */
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --radius-2xl: 1.5rem;
      --radius-3xl: 2rem;
      --radius-full: 9999px;
      
      /* Transitions */
      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 350ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-bounce: 500ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, var(--gray-50) 0%, #ffffff 100%);
      color: var(--gray-800);
      line-height: 1.5;
      overflow-x: hidden;
    }
    
    body.dark {
      background: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
      color: var(--gray-200);
    }
    
    /* Typography */
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }
    
    /* Glass Morphism */
    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    
    .dark .glass {
      background: rgba(20, 20, 30, 0.7);
      border-color: rgba(255, 255, 255, 0.08);
    }
    
    /* Card Styles */
    .card {
      background: white;
      border-radius: var(--radius-2xl);
      transition: all var(--transition-base);
      position: relative;
      overflow: hidden;
    }
    
    .dark .card {
      background: rgba(30, 30, 40, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-xl);
    }
    
    /* Button Styles */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-5);
      border-radius: var(--radius-full);
      font-weight: 500;
      font-size: 0.875rem;
      transition: all var(--transition-base);
      cursor: pointer;
      border: none;
      background: transparent;
      position: relative;
      overflow: hidden;
    }
    
    .btn-primary {
      background: var(--gradient-primary);
      color: white;
      box-shadow: var(--shadow-md);
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }
    
    .btn-primary:active {
      transform: translateY(0);
    }
    
    .btn-outline {
      border: 1px solid var(--gray-300);
      background: transparent;
    }
    
    .dark .btn-outline {
      border-color: var(--gray-600);
      color: var(--gray-300);
    }
    
    /* Navigation Tabs */
    .nav-tab {
      position: relative;
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-full);
      transition: all var(--transition-fast);
      cursor: pointer;
    }
    
    .nav-tab.active {
      background: var(--gradient-primary);
      color: white;
    }
    
    .nav-tab:not(.active):hover {
      background: var(--gray-100);
    }
    
    .dark .nav-tab:not(.active):hover {
      background: rgba(255, 255, 255, 0.08);
    }
    
    /* Skeleton Loader */
    .skeleton {
      background: linear-gradient(90deg, var(--gray-200) 0%, var(--gray-300) 50%, var(--gray-200) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    
    /* Progress Ring */
    .progress-ring {
      transform: rotate(-90deg);
    }
    
    /* Floating Elements */
    .floating {
      animation: float 6s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    
    /* Gradient Text */
    .gradient-text {
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    /* Grid Background */
    .grid-bg {
      background-image: 
        linear-gradient(var(--gray-200) 1px, transparent 1px),
        linear-gradient(90deg, var(--gray-200) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    
    .dark .grid-bg {
      background-image: 
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    }
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: var(--gray-100);
      border-radius: var(--radius-full);
    }
    
    ::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: var(--radius-full);
    }
    
    .dark ::-webkit-scrollbar-track {
      background: var(--gray-800);
    }
    
    /* Modal Overlay */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: all var(--transition-base);
    }
    
    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    
    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .animate-fade-up {
      animation: fadeInUp 0.6s ease-out forwards;
    }
    
    /* Responsive Utilities */
    @media (max-width: 768px) {
      :root {
        --space-16: 2rem;
        --space-20: 3rem;
      }
    }
  </style>
</head>

  <script>
    // ==================== ADVANCED STATE MANAGEMENT ====================
    class SciTrackApp {
      constructor() {
        this.currentPage = 'home';
        this.userData = this.loadUserData();
        this.charts = {};
        this.modalActive = false;
        this.init();
      }
      
      loadUserData() {
        const defaultData = {
          name: "Riya Kapoor",
          avatar: "RK",
          streak: 24,
          xp: 5120,
          rank: 1245,
          badges: [
            { name: "7-Day Warrior", icon: "🔥", color: "orange" },
            { name: "Quiz Master", icon: "📝", color: "purple" },
            { name: "Lab Genius", icon: "🧪", color: "green" },
            { name: "Top 5%", icon: "🏆", color: "gold" }
          ],
          completedTopics: 18,
          totalTopics: 32,
          subjectProgress: {
            Physics: { completed: 6, total: 12, accuracy: 74 },
            Chemistry: { completed: 5, total: 10, accuracy: 68 },
            Biology: { completed: 7, total: 10, accuracy: 86 }
          },
          recentTests: [
            { name: "Physics - Mechanics", score: 85, date: "2025-03-22" },
            { name: "Chemistry - Organic", score: 72, date: "2025-03-20" },
            { name: "Biology - Genetics", score: 94, date: "2025-03-18" },
            { name: "Full Mock #4", score: 79, date: "2025-03-15" }
          ],
          weeklyHours: [3.2, 4.1, 3.8, 5.2, 6.0, 7.1, 4.5],
          upcomingTasks: [
            { title: "Complete Electrochemistry", due: "Tomorrow", priority: "high" },
            { title: "Physics Problem Set #12", due: "In 2 days", priority: "medium" },
            { title: "Biology Revision: Genetics", due: "In 3 days", priority: "high" }
          ],
          weakTopics: [
            { name: "Rotational Motion", subject: "Physics", accuracy: 42 },
            { name: "Organic Isomerism", subject: "Chemistry", accuracy: 48 },
            { name: "Plant Physiology", subject: "Biology", accuracy: 65 }
          ]
        };
        
        const saved = localStorage.getItem('scitrack_user');
        return saved ? { ...defaultData, ...JSON.parse(saved) } : defaultData;
      }
      
      saveUserData() {
        localStorage.setItem('scitrack_user', JSON.stringify(this.userData));
      }
      
      updateProgress() {
        const percent = (this.userData.completedTopics / this.userData.totalTopics) * 100;
        document.querySelectorAll('.progress-fill').forEach(el => {
          el.style.width = `${percent}%`;
        });
        return percent;
      }
      
      async renderPage(page) {
        this.currentPage = page;
        const container = document.getElementById('app');
        if (!container) return;
        
        // Show skeleton loader
        container.innerHTML = this.getSkeletonLoader();
        
        // Simulate loading delay for smooth transition
        await new Promise(resolve => setTimeout(resolve, 100));
        
        // Render actual page content
        const content = this.getPageContent(page);
        container.innerHTML = content;
        
        // Initialize page-specific components
        this.initPageComponents(page);
        
        // Trigger AOS refresh
        if (typeof AOS !== 'undefined') {
          AOS.refresh();
        }
      }
      
      getSkeletonLoader() {
        return `
          <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="space-y-6">
              <div class="skeleton h-12 w-64 rounded-xl"></div>
              <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="skeleton h-48 rounded-2xl"></div>
                <div class="skeleton h-48 rounded-2xl"></div>
                <div class="skeleton h-48 rounded-2xl"></div>
              </div>
            </div>
          </div>
        `;
      }
      
      getPageContent(page) {
        switch(page) {
          case 'home': return this.renderHome();
          case 'dashboard': return this.renderDashboard();
          case 'syllabus': return this.renderSyllabus();
          case 'practice': return this.renderPractice();
          case 'analytics': return this.renderAnalytics();
          case 'community': return this.renderCommunity();
          case 'profile': return this.renderProfile();
          default: return this.renderHome();
        }
      }
      
      renderHome() {
        return `

            <!-- Hero Section -->
            <div class="relative overflow-hidden rounded-3xl bg-gradient-to-br from-primary/10 via-secondary/5 to-transparent p-8 md:p-12 mb-16" data-aos="fade-up">

                  <span>Next-Generation Learning Platform</span>
                </div>
                <h1 class="text-4xl md:text-6xl font-bold mb-4">
                  Master NEET/JEE with
                  <span class="gradient-text">AI-Powered Precision</span>
                </h1>
                <p class="text-lg text-gray-600 dark:text-gray-300 max-w-2xl mb-8">
                  Interactive simulations, real-time analytics, and personalized learning paths designed for the modern aspirant.
                </p>
                <div class="flex flex-wrap gap-4">
                  <button onclick="window.app.navigate('dashboard')" class="btn btn-primary">
                    <i class="fas fa-rocket"></i>
                    Start Your Journey
                  </button>
                  <button class="btn btn-outline">
                    <i class="fas fa-play"></i>
                    Watch Demo
                  </button>
                </div>
              </div>
              <div class="absolute top-0 right-0 w-96 h-96 bg-gradient-to-br from-primary/20 to-transparent rounded-full blur-3xl -z-0"></div>
            </div>
            
            <!-- Features Grid -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-16">
              <div class="card p-6" data-aos="fade-up" data-aos-delay="100">
                <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center mb-4">
                  <i class="fas fa-brain text-white text-xl"></i>
                </div>
                <h3 class="text-xl font-semibold mb-2">AI Adaptive Learning</h3>
                <p class="text-gray-500 dark:text-gray-400">Personalized recommendations that evolve with your performance and learning style.</p>
              </div>
              <div class="card p-6" data-aos="fade-up" data-aos-delay="200">
                <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-secondary to-pink-500 flex items-center justify-center mb-4">
                  <i class="fas fa-flask text-white text-xl"></i>
                </div>
                <h3 class="text-xl font-semibold mb-2">Virtual Labs</h3>
                <p class="text-gray-500 dark:text-gray-400">Interactive physics, chemistry, and biology simulations for hands-on learning.</p>
              </div>
              <div class="card p-6" data-aos="fade-up" data-aos-delay="300">
                <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-green-500 to-emerald-500 flex items-center justify-center mb-4">
                  <i class="fas fa-chart-line text-white text-xl"></i>
                </div>
                <h3 class="text-xl font-semibold mb-2">Predictive Analytics</h3>
                <p class="text-gray-500 dark:text-gray-400">Real-time rank prediction and performance insights to guide your preparation.</p>
              </div>
            </div>
            
            <!-- Stats Section -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-16">
              <div class="text-center p-6 rounded-2xl bg-white/50 dark:bg-gray-800/50 backdrop-blur-sm" data-aos="zoom-in">

                <div class="text-sm text-gray-500">Active Students</div>

              <div class="text-center p-6 rounded-2xl bg-white/50 dark:bg-gray-800/50 backdrop-blur-sm" data-aos="zoom-in" data-aos-delay="100">
                <div class="text-3xl font-bold gradient-text">10K+</div>
                <div class="text-sm text-gray-500">Practice Questions</div>
              </div>
              <div class="text-center p-6 rounded-2xl bg-white/50 dark:bg-gray-800/50 backdrop-blur-sm" data-aos="zoom-in" data-aos-delay="200">
                <div class="text-3xl font-bold gradient-text">98%</div>
                <div class="text-sm text-gray-500">Success Rate</div>
              </div>
              <div class="text-center p-6 rounded-2xl bg-white/50 dark:bg-gray-800/50 backdrop-blur-sm" data-aos="zoom-in" data-aos-delay="300">
                <div class="text-3xl font-bold gradient-text">24/7</div>
                <div class="text-sm text-gray-500">AI Support</div>
              </div>
            </div>
            
            <!-- Interactive Pendulum -->
            <div class="card p-6 mb-16" data-aos="fade-up">
              <h2 class="text-2xl font-bold mb-4">Interactive Physics Lab</h2>
              <p class="text-gray-500 dark:text-gray-400 mb-6">Explore Simple Harmonic Motion with this real-time pendulum simulation</p>
              <div class="flex flex-wrap gap-6 mb-6">
                <div>
                  <label class="block text-sm font-medium mb-1">Length (m)</label>
                  <input type="range" id="pendulum-length" min="0.3" max="1.5" step="0.01" value="1.0" class="w-40 accent-primary">
                </div>

      initPendulumSimulation() {
        const canvas = document.getElementById('pendulum-canvas');
        if (!canvas) return;
        
        const ctx = canvas.getContext('2d');
        let angle = Math.PI / 3;
        let angularVel = 0;
        let length = 1.0;
        const g = 9.8;
        
        const lengthSlider = document.getElementById('pendulum-length');
        const massSlider = document.getElementById('pendulum-mass');
        const periodSpan = document.getElementById('pendulum-period');
        
        const updatePeriod = () => {
          const T = 2 * Math.PI * Math.sqrt(length / g);
          if (periodSpan) periodSpan.textContent = `Period: ${T.toFixed(2)} s`;
        };
        
        if (lengthSlider) {
          lengthSlider.oninput = (e) => {
            length = parseFloat(e.target.value);
            updatePeriod();
          };
        }
        
        updatePeriod();
        
        const animate = () => {
          if (!canvas) return;
          
          const width = canvas.width;
          const height = canvas.height;
          ctx.clearRect(0, 0, width, height);
          
          const pivotX = width / 2;
          const pivotY = 40;
          const bobX = pivotX + length * 120 * Math.sin(angle);
          const bobY = pivotY + length * 120 * Math.cos(angle);
          
          // Draw string
          ctx.beginPath();
          ctx.moveTo(pivotX, pivotY);
          ctx.lineTo(bobX, bobY);
          ctx.strokeStyle = '#c084fc';
          ctx.lineWidth = 2;
          ctx.stroke();
          
          // Draw bob
          ctx.beginPath();
          ctx.arc(bobX, bobY, 12, 0, 2 * Math.PI);
          ctx.fillStyle = '#8b5cf6';
          ctx.fill();
          ctx.shadowBlur = 0;
          
          // Physics
          const alpha = -(g / length) * Math.sin(angle);
          angularVel += alpha * 0.016;
          angle += angularVel * 0.016;
          angle *= 0.999;
          
          requestAnimationFrame(animate);
        };
        
        animate();
      }
      
      initChapterToggles() {
        document.querySelectorAll('.chapter-toggle').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const chapter = btn.dataset.chapter;
            const completed = this.userData.completedTopics;
            const index = completed.indexOf(chapter);
            
            if (index === -1) {
              completed.push(chapter);
              btn.innerHTML = '<i class="fas fa-check text-white text-xs"></i>';
              btn.classList.add('bg-primary', 'border-primary');
            } else {
              completed.splice(index, 1);
              btn.innerHTML = '';
              btn.classList.remove('bg-primary', 'border-primary');
              btn.classList.add('border-gray-300', 'dark:border-gray-600');
            }
            
            this.userData.completedTopics = completed;
            this.userData.completedTopics = completed.filter((v, i, a) => a.indexOf(v) === i);
            this.userData.completedTopics = this.userData.completedTopics.filter(t => t !== undefined);
            this.userData.completedTopics = this.userData.completedTopics.filter(t => t && t.length > 0);
            
            this.saveUserData();
            this.updateProgress();
          });
        });
      }
      
      startQuickTest() {
        const container = document.getElementById('test-container');
        if (!container) return;
        
        container.innerHTML = `
          <div class="text-center">
            <div class="w-16 h-16 border-4 border-primary border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-gray-500">Generating adaptive questions...</p>
          </div>
        `;
        
        setTimeout(() => {
          container.innerHTML = `
            <h3 class="font-semibold text-lg mb-4">Quick Test • 5 Questions</h3>
            <div class="space-y-4">
              <div class="p-4 rounded-xl bg-gray-50 dark:bg-gray-800">
                <p class="font-medium mb-2">1. A particle moves with velocity v = 3t² m/s. Find acceleration at t = 2s.</p>
                <div class="grid grid-cols-2 gap-2 mt-2">
                  <label class="flex items-center gap-2"><input type="radio" name="q1"> 6 m/s²</label>
                  <label class="flex items-center gap-2"><input type="radio" name="q1"> 12 m/s²</label>
                  <label class="flex items-center gap-2"><input type="radio" name="q1"> 3 m/s²</label>
                  <label class="flex items-center gap-2"><input type="radio" name="q1"> 24 m/s²</label>
                </div>
              </div>
              <button class="btn btn-primary w-full">Submit Test</button>
            </div>
          `;
        }, 1000);
      }
      
      startFullMock() {
        alert('Full Mock Test interface is being prepared. Coming soon with real exam simulation!');
      }
      
      navigate(page) {
        this.renderPage(page);
        
        // Update active tab
        document.querySelectorAll('.nav-tab').forEach(tab => {
          if (tab.textContent.toLowerCase() === page || tab.dataset.page === page) {
            tab.classList.add('active');
          } else {
            tab.classList.remove('active');
          }
        });
      }
      
      init() {
        // Theme toggle
        const themeToggle = document.getElementById('themeToggle');
        if (themeToggle) {
          themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            localStorage.setItem('darkMode', document.body.classList.contains('dark'));
          });
        }
        
        // Load dark mode preference
        if (localStorage.getItem('darkMode') === 'true') {
          document.body.classList.add('dark');
        }
        
        // Setup navigation
        document.querySelectorAll('.nav-tab').forEach(tab => {
          tab.addEventListener('click', () => {
            const page = tab.textContent.toLowerCase().trim();
            this.navigate(page);
          });
        });
        
        // Initial render
        this.renderPage('home');
      }
    }
    
    // Initialize app
    const app = new SciTrackApp();
    window.app = app;
  </script>
