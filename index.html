<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>SciTrack | NEET/JEE Next-Gen Preparation Ecosystem</title>
  <!-- Tailwind CSS + Font Awesome + Google Fonts + Chart.js + AOS (optional) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
    body {
      background: #f9fafb;
      transition: background 0.3s, color 0.2s;
    }
    body.dark {
      background: #0a0c15;
      color: #eef2ff;
    }
    /* custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #e5e7eb; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    .dark ::-webkit-scrollbar-track { background: #1f2937; }
    /* card hover effect */
    .card-hover {
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .card-hover:hover {
      transform: translateY(-6px);
      box-shadow: 0 25px 30px -12px rgba(0,0,0,0.2);
    }
    /* glassmorphism */
    .glass-card {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.3);
    }
    .dark .glass-card {
      background: rgba(15,25,45,0.7);
      border-color: rgba(255,255,255,0.1);
    }
    /* animated gradient border */
    .animated-border {
      position: relative;
      background: linear-gradient(60deg, #3b82f6, #a855f7, #ec489a);
      background-size: 300% 300%;
      animation: gradientMove 4s ease infinite;
    }
    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .tab-active {
      border-bottom: 2px solid #3b82f6;
      color: #3b82f6;
      font-weight: 600;
    }
    .pulse-glow {
      animation: pulseGlow 2s infinite;
    }
    @keyframes pulseGlow {
      0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.4); }
      70% { box-shadow: 0 0 0 12px rgba(59,130,246,0); }
      100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
    }
    /* flip card for flashcards */
    .flip-card {
      background-color: transparent;
      perspective: 1000px;
      cursor: pointer;
    }
    .flip-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      text-align: center;
      transition: transform 0.6s;
      transform-style: preserve-3d;
      border-radius: 1rem;
    }
    .flip-card.flipped .flip-card-inner {
      transform: rotateY(180deg);
    }
    .flip-front, .flip-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 1rem;
      padding: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .flip-front {
      background: white;
      color: #1f2937;
    }
    .flip-back {
      background: #3b82f6;
      color: white;
      transform: rotateY(180deg);
    }
    .dark .flip-front {
      background: #1e293b;
      color: #e2e8f0;
    }
    .dark .flip-back {
      background: #2563eb;
    }
  </style>
</head>
<body class="antialiased">

        </div>
      `,
      dashboard: () => `

        });
        html += `</div><div class="mt-6 bg-blue-50 dark:bg-blue-900/20 p-4 rounded-xl"><i class="fas fa-chart-simple"></i> Overall completion: <span id="syllabusProgress">${Math.round((userData.completedTopics.length/userData.totalTopics)*100)}</span>%</div>`;

      },
      practice: () => `

      profile: () => `
        <div><h1 class="text-2xl font-bold mb-4">⚙️ Profile & Preferences</h1><div class="bg-white dark:bg-slate-800 rounded-xl p-6 shadow max-w-xl"><div class="flex items-center gap-4"><div class="w-20 h-20 bg-gradient-to-br from-blue-400 to-purple-500 rounded-full flex items-center justify-center text-3xl font-bold text-white">RM</div><div><h2 class="text-2xl font-bold">${userData.name}</h2><p class="text-gray-500">NEET 2026 Aspirant | Science Enthusiast</p></div></div><div class="mt-6"><label class="block font-medium">Target Exam</label><select id="targetExam" class="w-full p-2 border rounded dark:bg-gray-700"><option>NEET 2026</option><option>JEE Main 2026</option><option>JEE Advanced 2026</option></select><label class="block font-medium mt-3">Daily Study Goal (hours)</label><input type="number" id="studyGoal" value="6" class="w-full p-2 border rounded dark:bg-gray-700"><button id="saveProfileBtn" class="mt-5 bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition">Save Changes</button></div></div></div>

    };

    // Helper to render current page
    function renderPage(page) {
      const container = document.getElementById("app");
      if(pages[page]) container.innerHTML = pages[page]();
      else container.innerHTML = "<div class='text-center'>Page not found</div>";
      attachPageEvents(page);
    }

    function attachPageEvents(page) {
      if(page === "dashboard") {
        const scoreCtx = document.getElementById("scoreChart");
        if(scoreCtx) new Chart(scoreCtx, { type: 'line', data: { labels: userData.recentTests.slice(0,4).map(t=>t.name), datasets: [{ label: 'Score %', data: userData.recentTests.slice(0,4).map(t=>t.score), borderColor: '#3b82f6', tension: 0.3, fill: true, backgroundColor: 'rgba(59,130,246,0.1)' }] } });
      }
      if(page === "analytics") {
        const subjCtx = document.getElementById("subjectChart");
        if(subjCtx) new Chart(subjCtx, { type: 'bar', data: { labels: Object.keys(userData.subjectAccuracy), datasets: [{ label: 'Accuracy %', data: Object.values(userData.subjectAccuracy), backgroundColor: '#a855f7' }] } });
        const hoursCtx = document.getElementById("hoursChart");
        if(hoursCtx) new Chart(hoursCtx, { type: 'line', data: { labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'], datasets: [{ label: 'Hours', data: userData.dailyHours, borderColor: '#10b981', fill: false }] } });
      }
      if(page === "syllabus") {
        updateProgress();
        document.querySelectorAll('.toggle-chapter').forEach(btn => {
          btn.addEventListener('click', (e) => {
            let chap = btn.dataset.chapter;
            if(userData.completedTopics.includes(chap)) userData.completedTopics = userData.completedTopics.filter(c=>c!==chap);
            else userData.completedTopics.push(chap);
            saveUserData();
            renderPage("syllabus");
          });
        });
      }
      if(page === "practice") {
        document.getElementById("newQuickTest")?.addEventListener("click", generateQuickTest);
        document.getElementById("fullMockBtn")?.addEventListener("click", () => alert("Full mock interface is in beta. Will launch soon with real-time analytics!"));
      }
      if(page === "resources") {
        const flashCardDiv = document.querySelector(".flip-card");
        const frontSpan = document.getElementById("flashFront");
        const backSpan = document.getElementById("flashBack");
        function updateFlashcard() {
          frontSpan.innerText = flashcards[currentFlashcardIndex].front;
          backSpan.innerText = flashcards[currentFlashcardIndex].back;
          flashCardDiv.classList.remove("flipped");
        }
        document.getElementById("prevFlash")?.addEventListener("click", () => { currentFlashcardIndex = (currentFlashcardIndex-1+flashcards.length)%flashcards.length; updateFlashcard(); });
        document.getElementById("nextFlash")?.addEventListener("click", () => { currentFlashcardIndex = (currentFlashcardIndex+1)%flashcards.length; updateFlashcard(); });
        flashCardDiv?.addEventListener("click", () => flashCardDiv.classList.toggle("flipped"));
      }
      if(page === "profile") {
        document.getElementById("saveProfileBtn")?.addEventListener("click", () => { alert("Profile updated (demo)."); saveUserData(); });
      }
      if(page === "home") initPendulum();
    }

    // Pendulum simulation
    let pendulumAnimation;
    function initPendulum() {
      const canvas = document.getElementById("pendulumCanvas");
      if(!canvas) return;
      const ctx = canvas.getContext('2d');
      let angle = Math.PI/3;
      let angularVel = 0;
      let length = 1.0, g = 9.8;
      const lengthSlider = document.getElementById("pendLength");
      const massSlider = document.getElementById("pendMass");
      const periodSpan = document.getElementById("periodDisplay");
      function updatePeriod() { let T = 2 * Math.PI * Math.sqrt(length/g); if(periodSpan) periodSpan.innerText = `Period: ${T.toFixed(2)} s`; }
      if(lengthSlider) lengthSlider.oninput = (e) => { length = parseFloat(e.target.value); updatePeriod(); };
      if(massSlider) massSlider.oninput = (e) => { length = parseFloat(lengthSlider.value); updatePeriod(); };
      function animate() {
        if(!canvas) return;
        const width = canvas.width, height = canvas.height;
        ctx.clearRect(0,0,width,height);
        const pivotX = width/2, pivotY = 40;
        const bobX = pivotX + length*120 * Math.sin(angle);
        const bobY = pivotY + length*120 * Math.cos(angle);
        ctx.beginPath(); ctx.moveTo(pivotX,pivotY); ctx.lineTo(bobX,bobY); ctx.strokeStyle = "#facc15"; ctx.lineWidth = 2; ctx.stroke();
        ctx.beginPath(); ctx.arc(bobX,bobY,12,0,2*Math.PI); ctx.fillStyle = "#3b82f6"; ctx.fill();
        let alpha = -(g/length) * Math.sin(angle);
        angularVel += alpha * 0.016;
        angle += angularVel * 0.016;
        angle *= 0.999;
        requestAnimationFrame(animate);
      }
      updatePeriod();
      animate();
    }

    function generateQuickTest() {
      activeTestQuestions = [
        { text: "A particle moves along x-axis with velocity v = 3t². Find acceleration at t=2s.", options: ["6 m/s²","12 m/s²","3 m/s²","0"], correct: 1 },
        { text: "Which of the following is a greenhouse gas?", options: ["Oxygen","Nitrogen","CO₂","Argon"], correct: 2 },
        { text: "pH of pure water at 25°C is?", options: ["7","0","14","1"], correct: 0 },
        { text: "What is the function of ribosomes?", options: ["Protein synthesis","Lipid synthesis","Energy production","DNA replication"], correct: 0 },
        { text: "If focal length of convex lens is 20 cm, its power is?", options: ["+5 D","-5 D","+0.05 D","-0.05 D"], correct: 0 }
      ];
      userTestAnswers = new Array(5).fill(null);
      const container = document.getElementById("testContainer");
      if(!container) return;
      let html = `<h3 class="font-bold text-lg">⚡ AI-Generated Mini Test</h3><div class="space-y-4 mt-4">`;
      activeTestQuestions.forEach((q, idx) => {
        html += `<div class="border p-4 rounded-lg"><p class="font-semibold">${idx+1}. ${q.text}</p><div class="grid grid-cols-2 gap-2 mt-2">`;
        q.options.forEach((opt, optIdx) => {
          let checked = userTestAnswers[idx] === optIdx ? 'checked' : '';
          html += `<label class="flex items-center gap-2"><input type="radio" name="q${idx}" value="${optIdx}" ${checked} class="test-radio" data-qidx="${idx}" data-oidx="${optIdx}"> ${opt}</label>`;
        });
        html += `</div></div>`;
      });
      html += `<button id="submitTestBtn" class="mt-4 bg-green-600 text-white px-5 py-2 rounded-lg">Submit & Get Score</button><div id="testResult"></div>`;
      container.innerHTML = html;
      document.querySelectorAll('.test-radio').forEach(radio => {
        radio.addEventListener('change', (e) => {
          let qIdx = parseInt(radio.dataset.qidx);
          let oIdx = parseInt(radio.dataset.oidx);
          userTestAnswers[qIdx] = oIdx;
        });
      });
      document.getElementById("submitTestBtn")?.addEventListener("click", () => {
        let score = 0;
        activeTestQuestions.forEach((q,i) => { if(userTestAnswers[i] === q.correct) score++; });
        let percent = (score/activeTestQuestions.length)*100;
        document.getElementById("testResult").innerHTML = `<div class="mt-3 p-3 bg-blue-100 dark:bg-blue-900/40 rounded">🎯 Score: ${score}/${activeTestQuestions.length} (${percent}%)<br>✅ AI analysis: Focus on weak areas highlighted.</div>`;
        userData.recentTests.unshift({ name: "Quick Test", score: percent, total: 100, date: new Date().toISOString().slice(0,10) });
        saveUserData();
      });
    }

    // Routing & Dark Mode
    function navigate(page) {
      renderPage(page);
      document.querySelectorAll(".nav-btn").forEach(btn => {
        if(btn.dataset.page === page) btn.classList.add("tab-active");
        else btn.classList.remove("tab-active");
      });
    }
    document.querySelectorAll(".nav-btn").forEach(btn => btn.addEventListener("click", () => navigate(btn.dataset.page)));
    document.getElementById("darkModeToggle")?.addEventListener("click", () => {
      document.body.classList.toggle("dark");
      localStorage.setItem("darkMode", document.body.classList.contains("dark"));
    });
    if(localStorage.getItem("darkMode") === "true") document.body.classList.add("dark");
    navigate("home");
  </script>
</body>
