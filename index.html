      font-family: 'Inter', sans-serif;
    }
    body {
      background: #f8fafc;
      transition: background 0.2s, color 0.2s;
    }
    body.dark {
      background: #0f172a;
      color: #e2e8f0;
    }
    .card-hover {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card-hover:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 25px -12px rgba(0,0,0,0.15);
    }
    .glass-card {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
    }
    .dark .glass-card {
      background: rgba(15,23,42,0.7);
      border-color: rgba(255,255,255,0.1);
    }
    .sim-canvas {
      background: #1e293b;
      border-radius: 1rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);

    .progress-ring {
      transform: rotate(-90deg);

    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #e2e8f0;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: #3b82f6;
      border-radius: 10px;
    }
    .dark ::-webkit-scrollbar-track {
      background: #1e293b;
    }
    .tab-active {
      border-bottom: 2px solid #3b82f6;
      color: #3b82f6;
    }
  </style>
</head>

    loadUserData();

    const renderers = {
      home: () => `

      `,
      analytics: () => `

        <div class="grid md:grid-cols-2 gap-6"><div class="bg-white dark:bg-slate-800 p-5 rounded-xl shadow"><h3>Subject-wise Accuracy</h3><canvas id="subjectChart" height="200"></canvas></div><div class="bg-white dark:bg-slate-800 p-5 rounded-xl shadow"><h3>Weekly Study Hours</h3><canvas id="hoursChart" height="200"></canvas></div><div class="bg-white dark:bg-slate-800 p-5 rounded-xl shadow col-span-2"><h3>Weakness Heatmap (Top 3)</h3><ul class="mt-2 space-y-2"><li>⚛️ Physics: Rotational Motion (42% accuracy)</li><li>🧪 Chemistry: Chemical Kinetics (55%)</li><li>🧬 Biology: Plant Physiology (63%)</li></ul><div class="mt-3 bg-red-50 dark:bg-red-900/20 p-3 rounded-lg"><i class="fas fa-robot"></i> AI suggests: Spend 30 min daily on Rotational Motion problems.</div></div></div></div>
      `,
      resources: () => `
        <div><h1 class="text-2xl font-bold mb-4">📚 Resource Nexus</h1><div class="grid md:grid-cols-3 gap-5"><div class="bg-white dark:bg-slate-800 p-5 rounded-xl shadow"><i class="fas fa-video text-red-500 text-2xl"></i><h3 class="font-bold mt-2">Video Library</h3><p>NCERT line-by-line, IIT Prof. lectures, 3D animations.</p><button class="mt-2 text-blue-600">Browse →</button></div><div class="bg-white dark:bg-slate-800 p-5 rounded-xl shadow"><i class="fas fa-file-pdf text-red-600 text-2xl"></i><h3 class="font-bold mt-2">Handwritten Notes</h3><p>Topper’s notes, formula sheets, mind maps.</p></div><div class="bg-white dark:bg-slate-800 p-5 rounded-xl shadow"><i class="fas fa-lightbulb text-yellow-500 text-2xl"></i><h3 class="font-bold mt-2">Flashcards (Spaced Repetition)</h3><p>AI-generated from your weak topics.</p></div></div></div>
      `,
      community: () => `
        <div><h1 class="text-2xl font-bold mb-4">👥 SciTrack Community</h1><div class="flex flex-wrap gap-4 mb-5"><div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow flex-1"><i class="fas fa-users"></i> <strong>Study Groups</strong><p>Join "Physics Wizards" (24 members) | "Organic Masters" (18 members)</p></div><div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow flex-1"><i class="fas fa-trophy"></i> <strong>Leaderboard (Weekly)</strong><ol><li>1. Priya M. - 3420 XP</li><li>2. Aarav S. - 2450 XP</li><li>3. Rohan K. - 1980 XP</li></ol></div></div><div class="bg-white dark:bg-slate-800 rounded-xl p-5 shadow"><h3 class="font-bold">🔥 Trending Doubts</h3><div class="space-y-3 mt-2"><div class="border-b pb-2">Why does electron affinity decrease down group 17? <span class="text-blue-500">3 answers</span></div><div>Best book for Physics problems? <span class="text-blue-500">12 replies</span></div></div><textarea placeholder="Ask a doubt..." class="w-full mt-4 p-2 border rounded dark:bg-gray-700"></textarea><button class="mt-2 bg-blue-600 text-white px-4 py-1 rounded">Post</button></div></div>
      `,
      profile: () => `
        <div><h1 class="text-2xl font-bold mb-4">👤 Profile Settings</h1><div class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow max-w-lg"><div class="flex items-center gap-4"><div class="w-20 h-20 bg-blue-200 rounded-full flex items-center justify-center text-3xl font-bold">A</div><div><h2 class="text-xl">${userData.name}</h2><p class="text-gray-500">NEET 2026 Aspirant</p></div></div><div class="mt-4"><label class="block">Target Exam</label><select class="w-full p-2 border rounded dark:bg-gray-700"><option>NEET 2026</option><option>JEE Main 2026</option></select><label class="block mt-3">Daily Study Goal (hrs)</label><input type="number" value="5" class="w-full p-2 border rounded dark:bg-gray-700"><button id="saveProfileBtn" class="mt-4 bg-green-600 text-white px-5 py-2 rounded-lg">Save Changes</button></div></div></div>
      `
    };
    
    // Syllabus tree generator
    function generateSyllabusTree() {
      const topics = [
        { subject: "Physics", chapters: ["Kinematics","Laws of Motion","Thermodynamics","Waves","Optics"] },
        { subject: "Chemistry", chapters: ["Mole Concept","Atomic Structure","Chemical Bonding","Thermodynamics","Organic Basics"] },
        { subject: "Biology", chapters: ["Cell Biology","Genetics","Ecology","Human Physiology","Plant Physiology"] }
      ];
      let html = '';
      topics.forEach(sub => {
        let completedCount = sub.chapters.filter(ch => userData.completedTopics.includes(ch)).length;
        html += `<div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow"><h3 class="font-bold text-lg mb-2">${sub.subject}</h3>`;
        sub.chapters.forEach(ch => {
          let isDone = userData.completedTopics.includes(ch);
          html += `<div class="flex justify-between items-center py-1"><span>${ch}</span><button data-chapter="${ch}" class="toggle-chapter text-sm ${isDone ? 'bg-green-500 text-white' : 'bg-gray-200 dark:bg-gray-700'} px-2 py-0.5 rounded">${isDone ? '✓ Done' : 'Mark'}</button></div>`;
        });
        html += `<div class="mt-2 text-sm">Progress: ${completedCount}/${sub.chapters.length}</div></div>`;
      });
      return html;
    }
    
    function updateSyllabusProgress() {
      const total = 15; // 5*3
      const completed = userData.completedTopics.length;
      const percent = Math.round((completed/total)*100);
      const span = document.getElementById("syllabusProgress");
      if(span) span.innerText = percent;
    }
    
    // ----- Practice test generation (mock)
    function generateQuickTest() {
      testQuestions = [
        { text: "A ball is thrown vertically upward with velocity 20 m/s. Time of flight? (g=10)", options: ["2s","4s","1s","3s"], correct: 1 },
        { text: "Which is an aromatic compound?", options: ["Cyclohexane","Benzene","Hexene","Ethene"], correct: 1 },
        { text: "Which hormone regulates blood glucose?", options: ["Insulin","Adrenaline","Thyroxine","Estrogen"], correct: 0 },
        { text: "If the current through a resistor is doubled, power becomes:", options: ["Half","Same","Double","Four times"], correct: 3 },
        { text: "IUPAC name of CH3-CH2-CHO", options: ["Propanal","Ethanal","Butanal","Methanal"], correct: 0 }
      ];
      userAnswers = new Array(5).fill(null);
      renderTestUI();
    }
    
    function renderTestUI() {
      const container = document.getElementById("testContainer");
      if(!container) return;
      if(!testQuestions.length) { container.innerHTML = "<p>No active test. Click 'New Quick Test'</p>"; return; }
      let html = `<h3 class="font-bold text-lg">Adaptive Mini Test (5 Questions)</h3><div class="space-y-4 mt-3">`;
      testQuestions.forEach((q, idx) => {
        html += `<div class="border p-3 rounded-lg"><p class="font-medium">${idx+1}. ${q.text}</p><div class="grid grid-cols-2 gap-2 mt-2">`;
        q.options.forEach((opt, optIdx) => {
          let checked = userAnswers[idx] === optIdx ? 'checked' : '';
          html += `<label class="flex items-center gap-2"><input type="radio" name="q${idx}" value="${optIdx}" ${checked} class="test-radio" data-qidx="${idx}" data-oidx="${optIdx}"> ${opt}</label>`;
        });
        html += `</div></div>`;
      });
      html += `<button id="submitTestBtn" class="mt-4 bg-green-600 text-white px-5 py-2 rounded-lg">Submit & Get Score</button><div id="testResult"></div>`;
      container.innerHTML = html;
      // attach radio listeners
      document.querySelectorAll('.test-radio').forEach(radio => {
        radio.addEventListener('change', (e) => {
          let qIdx = parseInt(radio.dataset.qidx);
          let oIdx = parseInt(radio.dataset.oidx);
          userAnswers[qIdx] = oIdx;
        });
      });
      const submitBtn = document.getElementById("submitTestBtn");
      if(submitBtn) submitBtn.onclick = () => {
        let score = 0;
        testQuestions.forEach((q, i) => { if(userAnswers[i] === q.correct) score++; });
        let percent = (score/testQuestions.length)*100;
        document.getElementById("testResult").innerHTML = `<div class="mt-3 p-3 bg-blue-100 dark:bg-blue-900 rounded">Your score: ${score}/${testQuestions.length} (${percent}%)<br>Review explanations: AI will suggest weak areas.</div>`;
        userData.recentTests.unshift({ name: "Quick Test", score: percent, total: 100, date: new Date().toISOString().slice(0,10) });
        saveUserData();
      };
    }
    
    // Charts rendering (called after page load)
    function renderCharts() {
      // Score chart (dashboard)
      const scoreCtx = document.getElementById("scoreChart");
      if(scoreCtx && userData.recentTests.length) {
        new Chart(scoreCtx, { type: 'line', data: { labels: userData.recentTests.slice(0,4).map(t=>t.name), datasets: [{ label: 'Score %', data: userData.recentTests.slice(0,4).map(t=>t.score), borderColor: '#3b82f6' }] } });
      }
      const subjCtx = document.getElementById("subjectChart");
      if(subjCtx) new Chart(subjCtx, { type: 'bar', data: { labels: Object.keys(userData.subjectAccuracy), datasets: [{ label: 'Accuracy %', data: Object.values(userData.subjectAccuracy), backgroundColor: '#8b5cf6' }] } });
      const hoursCtx = document.getElementById("hoursChart");
      if(hoursCtx) new Chart(hoursCtx, { type: 'line', data: { labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'], datasets: [{ label: 'Hours studied', data: userData.dailyHours, borderColor: '#10b981' }] } });
    }
    
    // Pendulum simulation
    let pendAnimFrame;
    function initPendulumSim() {
      const canvas = document.getElementById("pendulumCanvas");
      if(!canvas) return;
      const ctx = canvas.getContext('2d');
      let angle = Math.PI/3;
      let angularVel = 0;
      let lastTimestamp = 0;
      let length = 1.0, mass = 0.5, g = 9.8;
      const lengthSlider = document.getElementById("pendLength");
      const massSlider = document.getElementById("pendMass");
      const periodSpan = document.getElementById("periodDisplay");
      if(lengthSlider) lengthSlider.oninput = (e) => { length = parseFloat(e.target.value); updatePeriod(); };
      if(massSlider) massSlider.oninput = (e) => { mass = parseFloat(e.target.value); updatePeriod(); };
      function updatePeriod() {
        let T = 2 * Math.PI * Math.sqrt(length/g);
        if(periodSpan) periodSpan.innerText = `Period: ${T.toFixed(2)} s`;
      }
      function animate() {
        if(!canvas) return;
        const width = canvas.width, height = canvas.height;
        ctx.clearRect(0,0,width,height);
        const pivotX = width/2, pivotY = 40;
        const bobX = pivotX + length*100 * Math.sin(angle);
        const bobY = pivotY + length*100 * Math.cos(angle);
        ctx.beginPath();
        ctx.moveTo(pivotX,pivotY);
        ctx.lineTo(bobX,bobY);
        ctx.strokeStyle = "#facc15";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(bobX,bobY,12,0,2*Math.PI);
        ctx.fillStyle = "#3b82f6";
        ctx.fill();
        ctx.fillStyle = "white";
        ctx.font = "12px monospace";
        ctx.fillText(`L:${length.toFixed(2)}m`,10,20);
        // physics update
        let alpha = -(g/length) * Math.sin(angle);
        angularVel += alpha * 0.016;
        angle += angularVel * 0.016;
        angle *= 0.9995;
        requestAnimationFrame(animate);
      }
      updatePeriod();
      animate();
    }
    
    // ----- PAGE ROUTING -----
    function navigateTo(page) {
      currentPage = page;
      const contentDiv = document.getElementById("app");
      if(renderers[page]) contentDiv.innerHTML = renderers[page]();
      else contentDiv.innerHTML = "<div>Page not found</div>";
      // attach dynamic listeners after render
      attachPageSpecificEvents();
      if(page === "dashboard") setTimeout(renderCharts, 50);
      if(page === "analytics") setTimeout(renderCharts, 50);
      if(page === "syllabus") {
        updateSyllabusProgress();
        document.querySelectorAll('.toggle-chapter').forEach(btn => {
          btn.addEventListener('click', (e) => {
            let chap = btn.dataset.chapter;
            if(userData.completedTopics.includes(chap)) userData.completedTopics = userData.completedTopics.filter(c=>c!==chap);
            else userData.completedTopics.push(chap);
            saveUserData();
            navigateTo("syllabus"); // refresh
          });
        });
      }
      if(page === "practice") {
        const newTestBtn = document.getElementById("newQuickTest");
        if(newTestBtn) newTestBtn.onclick = () => { generateQuickTest(); };
        const fullMockBtn = document.getElementById("fullMockBtn");
        if(fullMockBtn) fullMockBtn.onclick = () => { alert("Full mock coming soon! We're crafting realistic exam interface."); };
      }
      if(page === "profile") {
        document.getElementById("saveProfileBtn")?.addEventListener("click", () => { alert("Profile updated (demo)."); saveUserData(); });
      }
      if(page === "home") setTimeout(initPendulumSim, 100);
    }
    
    function attachPageSpecificEvents() {
      // re-attach nav buttons from content? but main nav is static, but internal nav buttons like from home
      document.querySelectorAll("[data-nav]").forEach(btn => {
        btn.addEventListener("click", (e) => { navigateTo(btn.dataset.nav); });
      });
    }
    
    // Dark mode toggle
    const darkToggle = document.getElementById("darkModeToggle");
    darkToggle?.addEventListener("click", () => {
      document.body.classList.toggle("dark");
      localStorage.setItem("darkMode", document.body.classList.contains("dark"));
    });
    if(localStorage.getItem("darkMode") === "true") document.body.classList.add("dark");
    
    // main nav listeners
    document.querySelectorAll(".nav-btn").forEach(btn => {
      btn.addEventListener("click", () => navigateTo(btn.dataset.page));
    });
    // initial load
    navigateTo("home");
  </script>
</body>
