<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>SciTrack | NEET/JEE Next-Gen Prep — Anime Aesthetic</title>
  <!-- Tailwind CSS + Font Awesome + Google Fonts + Chart.js + Anime.js (optional) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { font-family: 'Poppins', 'Inter', sans-serif; scroll-behavior: smooth; }
    body {
      background: linear-gradient(135deg, #fff5f8 0%, #f0f9ff 100%);
      transition: background 0.3s, color 0.2s;
    }
    body.dark {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #eef2ff;
    }
    /* custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #ffe4e9; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #ff85a1; border-radius: 10px; }
    .dark ::-webkit-scrollbar-track { background: #2d2b55; }
    .dark ::-webkit-scrollbar-thumb { background: #a78bfa; }
    /* card hover & anime glow */
    .card-hover {
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    .card-hover:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 30px -12px rgba(0,0,0,0.2);
    }
    /* glassmorphism with pastel */
    .glass-card {
      background: rgba(255,245,248,0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,200,210,0.4);
      border-radius: 2rem;
    }
    .dark .glass-card {
      background: rgba(30,30,60,0.6);
      border-color: rgba(167,139,250,0.2);
    }
    /* animated gradient border */
    .anime-border {
      background: linear-gradient(60deg, #ff9a9e, #fad0c4, #fad0c4, #ffdde1);
      background-size: 300% 300%;
      animation: gradientShift 5s ease infinite;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    /* tab active style */
    .tab-active {
      background: #ff85a1;
      color: white;
      border-radius: 2rem;
      box-shadow: 0 4px 12px rgba(255,133,161,0.3);
    }
    .dark .tab-active {
      background: #a78bfa;
      box-shadow: 0 4px 12px rgba(167,139,250,0.3);
    }
    /* floating kawaii elements */
    .float-bubble {
      position: fixed;
      background: rgba(255,218,224,0.3);
      border-radius: 50%;
      pointer-events: none;
      z-index: -1;
      animation: float 12s infinite ease-in-out;
    }
    @keyframes float {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
    /* flashcard flip */
    .flip-card {
      background-color: transparent;
      perspective: 1000px;
      cursor: pointer;
    }
    .flip-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      text-align: center;
      transition: transform 0.6s;
      transform-style: preserve-3d;
      border-radius: 1.5rem;
    }
    .flip-card.flipped .flip-card-inner {
      transform: rotateY(180deg);
    }
    .flip-front, .flip-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 1.5rem;
      padding: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .flip-front {
      background: #fff0f3;
      color: #c44569;
      border: 2px solid #ffb6c1;
    }
    .flip-back {
      background: #ffb6c1;
      color: white;
      transform: rotateY(180deg);
    }
    .dark .flip-front {
      background: #2d2b55;
      color: #c4b5fd;
      border-color: #a78bfa;
    }
    .dark .flip-back {
      background: #a78bfa;
    }
    /* cute pulse */
    .pulse-cute {
      animation: pulseSoft 2s infinite;
    }
    @keyframes pulseSoft {
      0% { box-shadow: 0 0 0 0 rgba(255,133,161,0.4); }
      70% { box-shadow: 0 0 0 12px rgba(255,133,161,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,133,161,0); }
    }
  </style>
</head>
<body class="relative overflow-x-hidden">

  <!-- Floating decorative bubbles (anime vibe) -->
  <div class="float-bubble w-64 h-64 top-20 left-10"></div>

  <div class="float-bubble w-48 h-48 top-1/2 right-1/4 bg-purple-200/20" style="animation-duration: 14s;"></div>

  <!-- Navigation Bar -->
  <nav class="sticky top-0 z-50 bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl border-b border-pink-200 dark:border-purple-800 shadow-sm">

          <span class="font-extrabold text-xl bg-gradient-to-r from-pink-500 to-purple-500 bg-clip-text text-transparent">SciTrack</span>
          <span class="text-xs bg-pink-100 dark:bg-purple-900 text-pink-600 dark:text-purple-200 px-2 py-0.5 rounded-full ml-2">✨ kawaii</span>
        </div>
        <div class="hidden md:flex space-x-1">

          <button data-page="dashboard" class="nav-btn px-4 py-2 rounded-full text-gray-700 dark:text-gray-200 hover:bg-pink-100 dark:hover:bg-purple-800 transition">📊 Dashboard</button>
          <button data-page="syllabus" class="nav-btn px-4 py-2 rounded-full text-gray-700 dark:text-gray-200 hover:bg-pink-100 dark:hover:bg-purple-800 transition">📖 Syllabus</button>
          <button data-page="practice" class="nav-btn px-4 py-2 rounded-full text-gray-700 dark:text-gray-200 hover:bg-pink-100 dark:hover:bg-purple-800 transition">✏️ Practice</button>
          <button data-page="analytics" class="nav-btn px-4 py-2 rounded-full text-gray-700 dark:text-gray-200 hover:bg-pink-100 dark:hover:bg-purple-800 transition">📈 Analytics</button>
          <button data-page="resources" class="nav-btn px-4 py-2 rounded-full text-gray-700 dark:text-gray-200 hover:bg-pink-100 dark:hover:bg-purple-800 transition">📚 Resources</button>
          <button data-page="community" class="nav-btn px-4 py-2 rounded-full text-gray-700 dark:text-gray-200 hover:bg-pink-100 dark:hover:bg-purple-800 transition">👥 Community</button>
          <button data-page="profile" class="nav-btn px-4 py-2 rounded-full text-gray-700 dark:text-gray-200 hover:bg-pink-100 dark:hover:bg-purple-800 transition">👤 Profile</button>
        </div>
        <div class="flex items-center space-x-3">
          <button id="darkModeToggle" class="p-2 rounded-full hover:bg-pink-100 dark:hover:bg-purple-800 transition">
            <i class="fas fa-moon dark:fa-sun text-pink-600 dark:text-yellow-300"></i>
          </button>
          <div class="relative group">
            <i class="fas fa-bell text-pink-500 dark:text-purple-300 cursor-pointer"></i>
            <span class="absolute -top-1 -right-1 w-2 h-2 bg-red-500 rounded-full animate-ping"></span>
            <div class="absolute right-0 mt-2 w-64 bg-white/90 dark:bg-gray-800 rounded-2xl shadow-lg hidden group-hover:block p-2 text-sm backdrop-blur">🔔 New AI study plan ready! 🎀</div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main id="app" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 relative z-10"></main>

  <footer class="border-t border-pink-200 dark:border-purple-800 mt-12 py-6 text-center text-gray-500 dark:text-gray-400 text-sm">
    <p>🌸 SciTrack — where science meets magic | AI-powered | 🧪 Virtual Labs | 🎴 Flashcards | Made with 💖 for NEET/JEE warriors</p>
  </footer>

  <script>
    // ------------------- GLOBAL STATE (cute & functional) -------------------
    let userData = {
      name: "Yuki Tanaka",
      streak: 23,
      points: 5120,
      badges: ["🔥 21-day streak", "🧪 Lab Genius", "🎀 Top 3%", "🌸 Doubt Master"],
      completedTopics: ["Kinematics", "Laws of Motion", "Mole Concept", "Chemical Bonding", "Cell Biology", "Genetics", "Thermodynamics"],
      totalTopics: 32,
      recentTests: [
        { name: "Physics - Mechanics", score: 85, total: 100, date: "2025-03-22" },
        { name: "Chemistry - Organic", score: 72, total: 100, date: "2025-03-20" },
        { name: "Biology - Genetics", score: 94, total: 100, date: "2025-03-18" },
        { name: "Full Mock #4", score: 79, total: 100, date: "2025-03-15" }
      ],
      subjectAccuracy: { Physics: 74, Chemistry: 70, Biology: 89, Maths: 72 },
      dailyHours: [3.2, 3.8, 5.0, 4.5, 6.2, 7.0, 5.5],
      studyPlan: [
        { task: "Complete Electrochemistry", due: "2025-03-24", priority: "high" },
        { task: "Solve 40 Physics Problems", due: "2025-03-23", priority: "medium" },
        { task: "Revise Plant Physiology", due: "2025-03-25", priority: "high" }
      ]
    };
    let activeTestQuestions = [];
    let userTestAnswers = [];
    let flashcards = [
      { front: "🌸 Newton's 1st Law", back: "An object remains at rest or uniform motion unless acted upon." },
      { front: "🎀 Ohm's Law", back: "V = IR — current is proportional to voltage." },
      { front: "🧪 Law of Conservation of Mass", back: "Mass is neither created nor destroyed." },
      { front: "💡 What is the pH of pure water?", back: "7 (neutral)" },
      { front: "⚛️ Who discovered penicillin?", back: "Alexander Fleming" }
    ];
    let currentFlashcardIndex = 0;

    function saveUserData() { localStorage.setItem("scitrack_user", JSON.stringify(userData)); }
    function loadUserData() {
      const stored = localStorage.getItem("scitrack_user");
      if(stored) userData = { ...userData, ...JSON.parse(stored) };
    }
    loadUserData();

    // helper progress bar
    function updateProgress() {
      let percent = (userData.completedTopics.length / userData.totalTopics) * 100;
      document.querySelectorAll(".progress-fill").forEach(el => el.style.width = `${percent}%`);
    }

    // ------------------- PAGE RENDERERS (anime/kawaii style) -------------------
    const pages = {
      home: () => `
        <div class="space-y-12">
          <div class="text-center space-y-4 animate-fade-in">
            <div class="inline-block p-1 px-4 rounded-full bg-pink-100 dark:bg-purple-900 text-pink-600 text-sm">✨ Next-Gen Learning Universe ✨</div>
            <h1 class="text-4xl md:text-6xl font-extrabold bg-gradient-to-r from-pink-400 via-purple-400 to-indigo-400 bg-clip-text text-transparent">Master NEET/JEE with<br>✨ Anime Energy ✨</h1>
            <p class="text-lg text-gray-600 dark:text-gray-300 max-w-2xl mx-auto">AI Coach, Interactive Sims, Gamified Progress — all wrapped in kawaii vibes.</p>
            <button data-nav="dashboard" class="mt-4 bg-gradient-to-r from-pink-500 to-purple-500 hover:from-pink-600 hover:to-purple-600 text-white px-8 py-3 rounded-full font-semibold shadow-lg transition transform hover:scale-105 pulse-cute">✨ Launch Dashboard ✨</button>
          </div>
          <div class="grid md:grid-cols-3 gap-8">
            <div class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-sm rounded-2xl p-6 shadow-xl card-hover border border-pink-100"><i class="fas fa-robot text-4xl text-pink-500 mb-4"></i><h3 class="text-xl font-bold">🤖 AI Sensei</h3><p>Personalized path, smart recommendations, and motivational kawaii tips.</p></div>
            <div class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-sm rounded-2xl p-6 shadow-xl card-hover border border-pink-100"><i class="fas fa-flask text-4xl text-purple-500 mb-4"></i><h3 class="text-xl font-bold">🧪 Virtual Lab</h3><p>Interactive physics, chemistry experiments — like anime science!</p></div>
            <div class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-sm rounded-2xl p-6 shadow-xl card-hover border border-pink-100"><i class="fas fa-chart-line text-4xl text-green-400 mb-4"></i><h3 class="text-xl font-bold">🎯 Rank Predictor</h3><p>AI-powered rank estimation & improvement roadmap.</p></div>
          </div>
          <!-- Pendulum Sim with kawaii style -->
          <div class="bg-gradient-to-r from-pink-50 to-purple-50 dark:from-slate-800 dark:to-slate-900 rounded-3xl p-6 shadow-2xl border border-pink-200">
            <h2 class="text-2xl font-bold mb-2 flex items-center gap-2"><i class="fas fa-dove text-pink-500"></i> Pendulum-chan Simulation</h2>
            <p class="mb-4">Adjust length & mass — watch the graceful swing (SHM)</p>
            <div class="flex flex-wrap gap-6 mb-6">
              <div><label class="block text-sm font-medium">Length (m) 📏</label><input type="range" id="pendLength" min="0.3" max="1.5" step="0.01" value="1.0" class="w-40 accent-pink-500"></div>
              <div><label class="block text-sm font-medium">Mass (kg) ⚖️</label><input type="range" id="pendMass" min="0.1" max="2.0" step="0.05" value="0.5" class="w-40 accent-purple-500"></div>
              <div><span id="periodDisplay" class="bg-white dark:bg-gray-700 px-4 py-2 rounded-full text-sm font-mono shadow">⏱️ Period: 2.01 s</span></div>
            </div>
            <canvas id="pendulumCanvas" width="500" height="280" class="w-full max-w-lg mx-auto bg-gray-800 rounded-2xl shadow-inner border-2 border-pink-300"></canvas>
          </div>
          <div class="bg-white/60 dark:bg-slate-800/60 rounded-2xl p-5 text-center backdrop-blur-sm"><i class="fas fa-quote-right text-3xl text-pink-400"></i><p class="italic text-lg">"Science is the most beautiful story ever told — let's write yours."</p></div>
        </div>
      `,
      dashboard: () => `
        <div class="space-y-6">
          <div class="flex flex-wrap justify-between items-center"><h1 class="text-2xl font-bold">🌸 Konnichiwa, ${userData.name}!</h1><div class="flex gap-3"><span class="bg-pink-100 dark:bg-purple-900/40 text-pink-800 dark:text-purple-200 px-3 py-1 rounded-full"><i class="fas fa-fire"></i> ${userData.streak} day streak 🔥</span><span class="bg-purple-100 dark:bg-purple-900/40 text-purple-800 dark:text-purple-200 px-3 py-1 rounded-full"><i class="fas fa-star"></i> ${userData.points} XP ✨</span></div></div>
          <div class="grid md:grid-cols-2 gap-6">
            <div class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-sm rounded-2xl p-5 shadow card-hover"><h3 class="font-semibold text-lg">📘 Syllabus Progress</h3><div class="mt-2"><div class="flex justify-between"><span>${userData.completedTopics.length}/${userData.totalTopics} topics mastered</span><span>${Math.round((userData.completedTopics.length/userData.totalTopics)*100)}%</span></div><div class="w-full bg-pink-200 rounded-full h-2.5"><div class="bg-pink-500 h-2.5 rounded-full progress-fill" style="width: ${(userData.completedTopics.length/userData.totalTopics)*100}%"></div></div><p class="mt-3 text-sm">🎯 Next: Electrochemistry, Rotational Motion, Biotechnology</p></div></div>
            <div class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-sm rounded-2xl p-5 shadow card-hover"><h3 class="font-semibold text-lg">🤖 AI Sensei says:</h3><p class="mt-2"><i class="fas fa-heart text-pink-500"></i> Your weak area: <strong>Organic Chemistry (Isomerism)</strong>. I've prepared 5 special practice questions just for you! 🎀</p><button class="mt-3 text-sm bg-pink-100 dark:bg-purple-900/40 px-4 py-1.5 rounded-full">✨ Let's Practice ✨</button></div>
            <div class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-sm rounded-2xl p-5 shadow col-span-2"><h3 class="font-semibold text-lg">📈 Test Score Evolution</h3><canvas id="scoreChart" height="120"></canvas></div>
            <div class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-sm rounded-2xl p-5 shadow"><h3 class="font-semibold text-lg">🏅 Kawaii Badges</h3><div class="flex flex-wrap gap-2 mt-2">${userData.badges.map(b => `<span class="bg-pink-50 dark:bg-gray-700 px-3 py-1 rounded-full text-sm"><i class="fas fa-medal text-pink-500"></i> ${b}</span>`).join('')}</div></div>
            <div class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-sm rounded-2xl p-5 shadow"><h3 class="font-semibold text-lg">📅 Today's Quests</h3><ul class="mt-2 space-y-2">${userData.studyPlan.map(t => `<li><i class="fas fa-check-circle text-pink-500"></i> ${t.task} <span class="text-xs text-gray-500">Due ${t.due}</span></li>`).join('')}</ul></div>
          </div>
        </div>
      `,
      syllabus: () => {
        const subjects = [
          { name: "Physics ⚛️", chapters: ["Kinematics","Laws of Motion","Work Energy","Thermodynamics","Waves","Optics","Electrostatics","Current Electricity"] },
          { name: "Chemistry 🧪", chapters: ["Mole Concept","Atomic Structure","Chemical Bonding","Thermodynamics","Equilibrium","Organic Basics","Hydrocarbons","Biomolecules"] },
          { name: "Biology 🌸", chapters: ["Cell Biology","Genetics","Ecology","Human Physiology","Plant Physiology","Biotechnology","Evolution","Reproduction"] }
        ];
        let html = `<h1 class="text-2xl font-bold mb-4">📖 Interactive Syllabus (Tap to complete)</h1><p class="mb-4">🌸 Mark topics as done — your progress syncs across the app!</p><div class="grid md:grid-cols-3 gap-6">`;
        subjects.forEach(sub => {
          let completedCount = sub.chapters.filter(ch => userData.completedTopics.includes(ch)).length;
          html += `<div class="bg-white/80 dark:bg-slate-800/80 rounded-2xl p-5 shadow"><h3 class="font-bold text-xl mb-3">${sub.name}</h3>`;
          sub.chapters.forEach(ch => {
            let isDone = userData.completedTopics.includes(ch);
            html += `<div class="flex justify-between items-center py-1 border-b border-pink-100 dark:border-gray-700"><span>${ch}</span><button data-chapter="${ch}" class="toggle-chapter text-xs px-3 py-1 rounded-full ${isDone ? 'bg-pink-500 text-white' : 'bg-pink-100 dark:bg-gray-700'}">${isDone ? '✓ Done' : '✨ Mark'}</button></div>`;
          });
          html += `<div class="mt-3 text-sm font-medium">🎀 Progress: ${completedCount}/${sub.chapters.length} (${Math.round(completedCount/sub.chapters.length*100)}%)</div></div>`;
        });
        html += `</div><div class="mt-6 bg-pink-50 dark:bg-purple-900/20 p-4 rounded-2xl"><i class="fas fa-chart-simple text-pink-500"></i> Overall completion: <span id="syllabusProgress">${Math.round((userData.completedTopics.length/userData.totalTopics)*100)}</span>%</div>`;
        return html;
      },
      practice: () => `
        <div><h1 class="text-2xl font-bold mb-4">✏️ Practice Dojo</h1><div class="flex flex-wrap gap-3 mb-6"><button id="newQuickTest" class="bg-pink-500 hover:bg-pink-600 text-white px-5 py-2 rounded-full shadow"><i class="fas fa-bolt"></i> Quick 5-Question Test</button><button id="fullMockBtn" class="bg-purple-500 hover:bg-purple-600 text-white px-5 py-2 rounded-full shadow"><i class="fas fa-chart-line"></i> Full Mock (AI-Adaptive)</button></div><div id="testContainer" class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-sm rounded-2xl p-6 shadow">🌸 Choose a test to begin your training.</div></div>
      `,
      analytics: () => `
        <div><h1 class="text-2xl font-bold mb-4">📊 Deep Analytics (with kawaii insights)</h1><div class="grid md:grid-cols-2 gap-6"><div class="bg-white/80 dark:bg-slate-800/80 rounded-2xl p-5 shadow"><h3>Subject Accuracy 🎯</h3><canvas id="subjectChart" height="200"></canvas></div><div class="bg-white/80 dark:bg-slate-800/80 rounded-2xl p-5 shadow"><h3>Weekly Study Hours 📚</h3><canvas id="hoursChart" height="200"></canvas></div><div class="bg-white/80 dark:bg-slate-800/80 rounded-2xl p-5 shadow col-span-2"><h3>🔍 Weakness Heatmap (AI Identified)</h3><ul class="mt-2 space-y-3"><li><span class="font-bold">⚛️ Physics:</span> Rotational Motion (42% accuracy) → <span class="text-pink-500">Needs love</span></li><li><span class="font-bold">🧪 Chemistry:</span> Organic Reaction Mechanism (48%) → <span class="text-purple-500">Practice more</span></li><li><span class="font-bold">🌸 Biology:</span> Plant Anatomy (65%) → <span class="text-yellow-500">Almost there</span></li></ul><div class="mt-4 bg-gradient-to-r from-pink-100 to-purple-100 dark:from-purple-900/20 p-4 rounded-2xl"><i class="fas fa-robot text-pink-600"></i> AI Sensei: Spend 20 min daily on Rotational Motion problems for a week. You got this! ✨</div></div></div></div>
      `,
      resources: () => `

      `,
      community: () => `
        <div><h1 class="text-2xl font-bold mb-4">👥 SciTrack Community (Anime-themed)</h1><div class="grid md:grid-cols-2 gap-6"><div class="bg-white/80 dark:bg-slate-800/80 rounded-2xl p-5 shadow"><h3><i class="fas fa-users text-pink-500"></i> Study Circles</h3><p>🔥 Physics Warriors (42 members) | 🧬 Bio Masters (28 members) | 🧪 Chem Titans (35 members)</p><button class="mt-3 bg-pink-500 text-white px-4 py-1 rounded-full">Join Group</button></div><div class="bg-white/80 dark:bg-slate-800/80 rounded-2xl p-5 shadow"><h3><i class="fas fa-trophy text-pink-500"></i> Weekly Leaderboard</h3><ol class="list-decimal pl-5 mt-2"><li>🌸 Yuki M. — 5120 XP</li><li>✨ Ananya S. — 4980 XP</li><li>🎀 Kunal V. — 4350 XP</li></ol></div><div class="col-span-2 bg-white/80 dark:bg-slate-800/80 rounded-2xl p-5 shadow"><h3>💬 Doubt Forum (Kawaii Edition)</h3><div class="space-y-3"><div class="border-b pb-2">📌 "Why does electron affinity decrease down group 17?" — <span class="text-pink-500">4 answers</span></div><div class="border-b pb-2">📌 "Best strategy for last 3 months?" — <span class="text-pink-500">12 answers</span></div></div><textarea placeholder="Ask your doubt..." rows="2" class="w-full mt-3 p-2 border rounded-2xl dark:bg-gray-800"></textarea><button class="mt-2 bg-pink-500 text-white px-4 py-1 rounded-full">Post</button></div></div></div>
      `,
      profile: () => `
        <div><h1 class="text-2xl font-bold mb-4">⚙️ Profile & Preferences (kawaii settings)</h1><div class="bg-white/80 dark:bg-slate-800/80 rounded-2xl p-6 shadow max-w-xl"><div class="flex items-center gap-4"><div class="w-20 h-20 bg-gradient-to-br from-pink-400 to-purple-500 rounded-full flex items-center justify-center text-3xl font-bold text-white shadow">YT</div><div><h2 class="text-2xl font-bold">${userData.name}</h2><p class="text-gray-500">NEET 2026 Aspirant | ✨ Science Enthusiast</p></div></div><div class="mt-6"><label class="block font-medium">Target Exam</label><select id="targetExam" class="w-full p-2 border rounded-2xl dark:bg-gray-700"><option>NEET 2026</option><option>JEE Main 2026</option><option>JEE Advanced 2026</option></select><label class="block font-medium mt-3">Daily Study Goal (hours)</label><input type="number" id="studyGoal" value="6" class="w-full p-2 border rounded-2xl dark:bg-gray-700"><button id="saveProfileBtn" class="mt-5 bg-pink-500 text-white px-6 py-2 rounded-full hover:bg-pink-600 transition">Save Changes ✨</button></div></div></div>
      `
    };

    function renderPage(page) {
      const container = document.getElementById("app");
      if(pages[page]) container.innerHTML = pages[page]();
      else container.innerHTML = "<div class='text-center'>Page not found</div>";
      attachPageEvents(page);
    }

    function attachPageEvents(page) {
      if(page === "dashboard") {
        const scoreCtx = document.getElementById("scoreChart");
        if(scoreCtx) new Chart(scoreCtx, { type: 'line', data: { labels: userData.recentTests.slice(0,4).map(t=>t.name), datasets: [{ label: 'Score %', data: userData.recentTests.slice(0,4).map(t=>t.score), borderColor: '#ff85a1', tension: 0.3, fill: true, backgroundColor: 'rgba(255,133,161,0.1)' }] } });
      }
      if(page === "analytics") {
        const subjCtx = document.getElementById("subjectChart");
        if(subjCtx) new Chart(subjCtx, { type: 'bar', data: { labels: Object.keys(userData.subjectAccuracy), datasets: [{ label: 'Accuracy %', data: Object.values(userData.subjectAccuracy), backgroundColor: '#c084fc' }] } });
        const hoursCtx = document.getElementById("hoursChart");
        if(hoursCtx) new Chart(hoursCtx, { type: 'line', data: { labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'], datasets: [{ label: 'Hours', data: userData.dailyHours, borderColor: '#f472b6', fill: false }] } });
      }
      if(page === "syllabus") {
        updateProgress();
        document.querySelectorAll('.toggle-chapter').forEach(btn => {
          btn.addEventListener('click', (e) => {
            let chap = btn.dataset.chapter;
            if(userData.completedTopics.includes(chap)) userData.completedTopics = userData.completedTopics.filter(c=>c!==chap);
            else userData.completedTopics.push(chap);
            saveUserData();
            renderPage("syllabus");
          });
        });
      }
      if(page === "practice") {
        document.getElementById("newQuickTest")?.addEventListener("click", generateQuickTest);
        document.getElementById("fullMockBtn")?.addEventListener("click", () => alert("Full mock coming soon! Prepare for ultimate challenge ✨"));
      }
      if(page === "resources") {
        const flashCardDiv = document.querySelector(".flip-card");
        const frontSpan = document.getElementById("flashFront");
        const backSpan = document.getElementById("flashBack");
        function updateFlashcard() {
          frontSpan.innerText = flashcards[currentFlashcardIndex].front;
          backSpan.innerText = flashcards[currentFlashcardIndex].back;
          flashCardDiv.classList.remove("flipped");
        }
        document.getElementById("prevFlash")?.addEventListener("click", () => { currentFlashcardIndex = (currentFlashcardIndex-1+flashcards.length)%flashcards.length; updateFlashcard(); });
        document.getElementById("nextFlash")?.addEventListener("click", () => { currentFlashcardIndex = (currentFlashcardIndex+1)%flashcards.length; updateFlashcard(); });
        flashCardDiv?.addEventListener("click", () => flashCardDiv.classList.toggle("flipped"));
      }
      if(page === "profile") {
        document.getElementById("saveProfileBtn")?.addEventListener("click", () => { alert("Profile updated! (demo) 🎀"); saveUserData(); });
      }
      if(page === "home") initPendulum();
    }

    // Pendulum simulation (same as before but with aesthetic)
    let pendulumAnimation;
    function initPendulum() {
      const canvas = document.getElementById("pendulumCanvas");
      if(!canvas) return;
      const ctx = canvas.getContext('2d');
      let angle = Math.PI/3;
      let angularVel = 0;
      let length = 1.0, g = 9.8;
      const lengthSlider = document.getElementById("pendLength");
      const massSlider = document.getElementById("pendMass");
      const periodSpan = document.getElementById("periodDisplay");
      function updatePeriod() { let T = 2 * Math.PI * Math.sqrt(length/g); if(periodSpan) periodSpan.innerText = `⏱️ Period: ${T.toFixed(2)} s`; }
      if(lengthSlider) lengthSlider.oninput = (e) => { length = parseFloat(e.target.value); updatePeriod(); };
      if(massSlider) massSlider.oninput = (e) => { length = parseFloat(lengthSlider.value); updatePeriod(); };
      function animate() {
        if(!canvas) return;
        const width = canvas.width, height = canvas.height;
        ctx.clearRect(0,0,width,height);
        const pivotX = width/2, pivotY = 40;
        const bobX = pivotX + length*120 * Math.sin(angle);
        const bobY = pivotY + length*120 * Math.cos(angle);
        ctx.beginPath(); ctx.moveTo(pivotX,pivotY); ctx.lineTo(bobX,bobY); ctx.strokeStyle = "#ffb6c1"; ctx.lineWidth = 3; ctx.stroke();
        ctx.beginPath(); ctx.arc(bobX,bobY,14,0,2*Math.PI); ctx.fillStyle = "#ff85a1"; ctx.fill(); ctx.shadowBlur = 8;
        let alpha = -(g/length) * Math.sin(angle);
        angularVel += alpha * 0.016;
        angle += angularVel * 0.016;
        angle *= 0.999;
        requestAnimationFrame(animate);
      }
      updatePeriod();
      animate();
    }

    function generateQuickTest() {
      activeTestQuestions = [
        { text: "🌸 A particle moves with v = 4t². Find acceleration at t=3s.", options: ["12 m/s²","24 m/s²","8 m/s²","36 m/s²"], correct: 1 },
        { text: "🎀 Which gas is responsible for global warming?", options: ["O₂","CO₂","N₂","H₂"], correct: 1 },
        { text: "🧪 pH of 0.001 M HCl is?", options: ["2","3","4","1"], correct: 1 },
        { text: "💡 Function of mitochondria?", options: ["Protein synthesis","ATP production","Photosynthesis","Lipid storage"], correct: 1 },
        { text: "⚛️ Unit of electric current?", options: ["Volt","Ampere","Ohm","Watt"], correct: 1 }
      ];
      userTestAnswers = new Array(5).fill(null);
      const container = document.getElementById("testContainer");
      if(!container) return;
      let html = `<h3 class="font-bold text-lg">✨ AI-Generated Mini Test ✨</h3><div class="space-y-4 mt-4">`;
      activeTestQuestions.forEach((q, idx) => {
        html += `<div class="border border-pink-200 p-4 rounded-2xl"><p class="font-semibold">${idx+1}. ${q.text}</p><div class="grid grid-cols-2 gap-2 mt-2">`;
        q.options.forEach((opt, optIdx) => {
          let checked = userTestAnswers[idx] === optIdx ? 'checked' : '';
          html += `<label class="flex items-center gap-2"><input type="radio" name="q${idx}" value="${optIdx}" ${checked} class="test-radio" data-qidx="${idx}" data-oidx="${optIdx}"> ${opt}</label>`;
        });
        html += `</div></div>`;
      });
      html += `<button id="submitTestBtn" class="mt-4 bg-pink-500 text-white px-5 py-2 rounded-full">Submit & Get Score 🎀</button><div id="testResult"></div>`;
      container.innerHTML = html;
      document.querySelectorAll('.test-radio').forEach(radio => {
        radio.addEventListener('change', (e) => {
          let qIdx = parseInt(radio.dataset.qidx);
          let oIdx = parseInt(radio.dataset.oidx);
          userTestAnswers[qIdx] = oIdx;
        });
      });
      document.getElementById("submitTestBtn")?.addEventListener("click", () => {
        let score = 0;
        activeTestQuestions.forEach((q,i) => { if(userTestAnswers[i] === q.correct) score++; });
        let percent = (score/activeTestQuestions.length)*100;
        document.getElementById("testResult").innerHTML = `<div class="mt-3 p-3 bg-pink-100 dark:bg-purple-900/40 rounded-2xl">🎉 Score: ${score}/${activeTestQuestions.length} (${percent}%)<br>✨ AI Sensei: Keep practicing, you're improving! ✨</div>`;
        userData.recentTests.unshift({ name: "Quick Test", score: percent, total: 100, date: new Date().toISOString().slice(0,10) });
        saveUserData();
      });
    }

    // Routing & Dark Mode
    function navigate(page) {
      renderPage(page);
      document.querySelectorAll(".nav-btn").forEach(btn => {
        if(btn.dataset.page === page) btn.classList.add("tab-active");
        else btn.classList.remove("tab-active");
      });
    }
    document.querySelectorAll(".nav-btn").forEach(btn => btn.addEventListener("click", () => navigate(btn.dataset.page)));
    document.getElementById("darkModeToggle")?.addEventListener("click", () => {
      document.body.classList.toggle("dark");
      localStorage.setItem("darkMode", document.body.classList.contains("dark"));
    });
    if(localStorage.getItem("darkMode") === "true") document.body.classList.add("dark");
    navigate("home");
  </script>
</body>
